<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>แนะนำสถานที่สำหรับคุณ — ฐานข้อมูลสถานปฏิบัติธรรมไทย</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Prompt:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --background: #F7F5F0;
      --foreground: #2D3436;
      --primary: #4A7C59;
      --primary-light: #5A8C69;
      --primary-dark: #3A6C49;
      --secondary: #A8D5BA;
      --secondary-light: #C4E8D1;
      --secondary-dark: #8AC4A3;
      --accent: #D4A847;
      --accent-light: #E0BE6E;
      --accent-dark: #B8902E;
      --tertiary: #B8A9C9;
      --tertiary-light: #D0C5DC;
      --tertiary-dark: #9F8DB6;
      --warning: #C4836A;
      --warning-light: #D9A08B;
      --warning-dark: #A96B52;
      --surface: #FFFFFF;
      --surface-alt: #F0EDE6;
      --card: #FFFFFF;
      --card-hover: #EFF8F2;
      --border: #D1CCC4;
      --border-light: #E5E0D8;
      --muted: #7A7670;
      --muted-light: #A09B94;
      --gradient-primary: linear-gradient(135deg, #4A7C59 0%, #A8D5BA 60%, #D4A847 100%);
      --gradient-surface: linear-gradient(180deg, #F7F5F0 0%, #EFF8F2 100%);
      --gradient-header: linear-gradient(135deg, #3A6C49 0%, #4A7C59 100%);
      --shadow-sm: 0 1px 3px rgba(45, 52, 54, 0.08);
      --shadow-md: 0 4px 12px rgba(45, 52, 54, 0.10);
      --shadow-lg: 0 8px 24px rgba(45, 52, 54, 0.12);
      --radius-sm: 6px;
      --radius-md: 12px;
      --radius-lg: 18px;
      --spacing-xs: 4px;
      --spacing-sm: 8px;
      --spacing-md: 16px;
      --spacing-base: 20px;
      --spacing-lg: 32px;
      --spacing-xl: 48px;
      --font-family: 'Sarabun', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-size-xs: 11px;
      --font-size-sm: 13px;
      --font-size-base: 15px;
      --font-size-md: 17px;
      --font-size-lg: 22px;
      --font-size-xl: 28px;
      --font-size-2xl: 36px;
      --font-weight-light: 300;
      --font-weight-normal: 400;
      --font-weight-medium: 500;
      --font-weight-semibold: 600;
      --font-weight-bold: 700;
      --line-height: 1.65;
      --transition: 0.2s ease;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: var(--font-family); background: var(--background); color: var(--foreground); font-size: var(--font-size-base); line-height: var(--line-height); min-height: 100vh; }

    /* NAV */
    .nav-solid {
      background: var(--foreground);
      padding: 14px 0;
      position: relative; z-index: 1000;
    }
    .nav-inner {
      max-width: 1200px; margin: 0 auto; padding: 0 32px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .nav-logo {
      display: flex; align-items: center; gap: 10px; cursor: pointer; text-decoration: none;
    }
    .nav-logo-text {
      font-family: 'Prompt', sans-serif;
      font-size: 22px; font-weight: 700; letter-spacing: -0.5px;
      color: #fff;
    }
    .nav-links { display: flex; gap: 28px; align-items: center; }
    .nav-link {
      color: rgba(255,255,255,0.7); text-decoration: none;
      font-size: 15px; font-weight: 400;
      transition: color 0.3s;
    }
    .nav-link:hover { color: rgba(255,255,255,1); }
    .nav-btn {
      padding: 9px 22px; border-radius: 100px;
      border: 1.5px solid rgba(255,255,255,0.3);
      background: transparent; color: #fff;
      font-size: 14px; font-weight: 500; cursor: pointer;
      font-family: inherit; transition: all 0.3s;
    }
    .nav-btn:hover { background: rgba(255,255,255,0.1); }

    /* HERO */
    .hero {
      background: var(--gradient-header);
      padding: 64px 40px 72px; text-align: center; position: relative; overflow: hidden;
    }
    .hero::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse 60% 80% at 50% 100%, rgba(168,213,186,0.25) 0%, transparent 70%);
    }
    .hero-icon {
      position: relative; z-index: 1;
      width: 56px; height: 56px; margin: 0 auto 16px;
      background: rgba(255,255,255,0.15); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .hero-icon svg { width: 28px; height: 28px; stroke: var(--surface); fill: none; stroke-width: 1.5; }
    .hero h1 { position: relative; z-index: 1; font-size: clamp(24px, 4vw, 38px); color: var(--surface); font-weight: var(--font-weight-bold); margin-bottom: 12px; }
    .hero p { position: relative; z-index: 1; color: rgba(255,255,255,0.7); font-size: var(--font-size-base); max-width: 480px; margin: 0 auto; }

    /* QUIZ CONTAINER */
    .quiz-wrap {
      max-width: 760px; margin: -32px auto 0; position: relative; z-index: 10;
      padding: 0 20px 80px;
    }

    /* PROGRESS */
    .progress-wrap { margin-bottom: var(--spacing-lg); }
    .progress-track {
      height: 4px; background: rgba(74,124,89,0.15); border-radius: 4px;
      overflow: hidden; margin-bottom: 10px;
    }
    .progress-fill {
      height: 100%; background: linear-gradient(to right, var(--primary), var(--secondary));
      border-radius: 4px; transition: width 0.4s ease;
    }
    .progress-label { font-size: var(--font-size-xs); color: var(--muted); text-align: right; }

    /* QUESTION CARD */
    .question-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
      animation: slideIn 0.35s ease both;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .question-header {
      background: var(--gradient-header);
      padding: 28px 32px;
    }
    .question-num {
      font-size: var(--font-size-xs); font-weight: var(--font-weight-bold); letter-spacing: 2px;
      text-transform: uppercase; color: var(--secondary-light); margin-bottom: 10px;
    }
    .question-text {
      font-size: clamp(18px, 3vw, 24px); font-weight: var(--font-weight-bold); color: var(--surface); line-height: 1.4;
    }
    .question-sub { color: rgba(255,255,255,0.55); font-size: 14px; margin-top: 6px; }

    /* OPTIONS */
    .options-grid { padding: 24px 28px 28px; display: flex; flex-direction: column; gap: 12px; }
    .option-btn {
      display: flex; align-items: center; gap: 14px;
      padding: 16px 20px; border-radius: var(--radius-md);
      border: 2px solid var(--border); background: var(--surface);
      cursor: pointer; transition: all var(--transition); text-align: left;
      font-family: var(--font-family); font-size: var(--font-size-base); color: var(--foreground);
      width: 100%;
    }
    .option-btn:hover { border-color: var(--primary); background: var(--card-hover); transform: translateX(4px); }
    .option-btn.selected { border-color: var(--primary); background: #EFF8F2; }
    .option-icon {
      flex-shrink: 0; width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      background: var(--surface-alt); border-radius: var(--radius-sm);
      transition: all var(--transition);
    }
    .option-icon svg { width: 18px; height: 18px; stroke: var(--primary); fill: none; stroke-width: 1.5; }
    .option-btn.selected .option-icon { background: var(--primary); }
    .option-btn.selected .option-icon svg { stroke: var(--surface); }
    .option-text { flex: 1; }
    .option-label { font-weight: var(--font-weight-semibold); display: block; }
    .option-sub { font-size: var(--font-size-xs); color: var(--muted); display: block; margin-top: 2px; }
    .option-check {
      width: 22px; height: 22px; border-radius: 50%;
      border: 2px solid var(--border); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all var(--transition);
    }
    .option-btn.selected .option-check {
      background: var(--primary); border-color: var(--primary);
    }

    /* NAV BUTTONS */
    .quiz-nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0 28px 28px;
    }
    .btn-nav {
      padding: 12px 28px; border-radius: var(--radius-sm); font-size: 14px; font-weight: var(--font-weight-semibold);
      cursor: pointer; border: none; font-family: var(--font-family); transition: all var(--transition);
    }
    .btn-back {
      background: transparent; border: 2px solid var(--border); color: var(--muted);
    }
    .btn-back:hover { background: var(--card-hover); border-color: var(--primary); }
    .btn-next {
      background: var(--primary); color: var(--surface); padding: 12px 36px;
    }
    .btn-next:hover { background: var(--primary-dark); }
    .btn-next:disabled { opacity: 0.4; cursor: not-allowed; }

    /* RESULTS */
    .results-section { display: none; animation: slideIn 0.4s ease both; }

    .results-header-card {
      background: var(--gradient-header);
      border-radius: var(--radius-lg);
      padding: 36px 32px;
      text-align: center; margin-bottom: 24px;
      box-shadow: var(--shadow-lg);
    }
    .results-icon {
      width: 52px; height: 52px; margin: 0 auto 16px;
      background: rgba(255,255,255,0.15); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .results-icon svg { width: 26px; height: 26px; stroke: var(--surface); fill: none; stroke-width: 1.5; }
    .results-title { font-size: clamp(20px, 3.5vw, 28px); font-weight: var(--font-weight-bold); color: var(--surface); margin-bottom: 8px; }
    .results-sub { color: rgba(255,255,255,0.6); font-size: var(--font-size-base); }
    .results-profile {
      display: inline-block; margin-top: 16px;
      background: rgba(168,213,186,0.2); border: 1px solid rgba(168,213,186,0.5);
      color: var(--secondary-light); padding: 6px 18px; border-radius: 20px;
      font-size: var(--font-size-sm); font-weight: var(--font-weight-semibold);
    }

    /* RESULT CARDS */
    .result-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden; margin-bottom: 16px;
      box-shadow: var(--shadow-md);
      transition: all 0.25s;
    }
    .result-card.top-pick {
      border-color: var(--primary);
      box-shadow: 0 4px 24px rgba(74,124,89,0.18);
    }
    .top-badge {
      background: linear-gradient(to right, var(--primary-dark), var(--primary));
      color: var(--surface); font-size: var(--font-size-xs); font-weight: var(--font-weight-bold);
      letter-spacing: 1.5px; text-transform: uppercase;
      padding: 8px 20px; text-align: center;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .top-badge svg { width: 14px; height: 14px; stroke: var(--accent-light); fill: none; stroke-width: 2; }
    .result-body { padding: 24px; }
    .result-match {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 14px;
    }
    .result-names h3 { font-size: 19px; font-weight: var(--font-weight-bold); color: var(--foreground); margin-bottom: 3px; }
    .result-names p { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 14px; color: var(--muted); }
    .match-score {
      flex-shrink: 0; margin-left: 16px;
      width: 52px; height: 52px; border-radius: 50%;
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      display: flex; align-items: center; justify-content: center;
      flex-direction: column;
    }
    .match-num { font-size: 16px; font-weight: var(--font-weight-bold); color: var(--surface); line-height: 1; }
    .match-pct { font-size: 9px; color: rgba(255,255,255,0.8); }

    .why-list { margin-bottom: 16px; }
    .why-item {
      display: flex; align-items: flex-start; gap: 8px;
      font-size: var(--font-size-sm); color: var(--foreground); padding: 4px 0;
    }
    .why-dot { color: var(--primary); flex-shrink: 0; margin-top: 2px; }

    .result-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding-top: 16px; border-top: 1px solid var(--border-light);
    }
    .result-location {
      font-size: var(--font-size-xs); color: var(--muted);
      display: flex; align-items: center; gap: 4px;
    }
    .result-location svg { width: 14px; height: 14px; stroke: var(--muted); fill: none; stroke-width: 1.5; }
    .btn-visit {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 20px; border-radius: var(--radius-sm);
      background: var(--primary); color: var(--surface);
      font-size: var(--font-size-sm); font-weight: var(--font-weight-semibold); text-decoration: none;
      transition: background var(--transition);
    }
    .btn-visit:hover { background: var(--primary-dark); }

    .restart-wrap { text-align: center; margin-top: 32px; }
    .btn-restart {
      padding: 12px 36px; border-radius: var(--radius-sm);
      border: 2px solid var(--border); background: var(--surface);
      font-size: 14px; font-weight: var(--font-weight-semibold); color: var(--muted);
      cursor: pointer; font-family: var(--font-family); transition: all var(--transition);
    }
    .btn-restart:hover { border-color: var(--primary); color: var(--foreground); background: var(--card-hover); }

    /* FOOTER */
    .page-footer { background: var(--foreground); color: rgba(255,255,255,0.5); text-align: center; padding: 24px 40px; font-size: var(--font-size-xs); }
    .page-footer a { color: var(--secondary-light); text-decoration: none; }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      .nav-links .nav-link { display: none; }
      .nav-inner { padding: 0 20px; }
      .hero { padding: 48px 20px 56px; }
      .quiz-wrap { padding: 0 12px 60px; }
      .question-header { padding: 22px 20px; }
      .options-grid { padding: 18px 16px 20px; }
      .quiz-nav { padding: 0 16px 20px; }
      .result-body { padding: 18px 16px; }
    }
  </style>
</head>

<!-- NAV -->
<nav class="nav-solid">
  <div class="nav-inner">
    <a class="nav-logo" href="index.html">

</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-icon">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 000 20 14.5 14.5 0 000-20M2 12h20"/></svg>

  <h1>สถานที่เหมาะกับคุณ</h1>
  <p>ตอบคำถาม 5 ข้อ แล้วเราจะแนะนำสถานปฏิบัติธรรมที่ตรงกับความต้องการของคุณ</p>

<!-- QUIZ -->
<div class="quiz-wrap">

  <!-- PROGRESS -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:20%"></div></div>
    <div class="progress-label" id="progressLabel">คำถามที่ 1 จาก 5</div>
  </div>

  <!-- QUIZ CARD -->
  <div id="quizSection">
    <div class="question-card" id="questionCard">
      <div class="question-header">
        <div class="question-num" id="questionNum">คำถามที่ 1</div>
        <div class="question-text" id="questionText"></div>

      </div>
      <div class="options-grid" id="optionsGrid"></div>
      <div class="quiz-nav">
        <button class="btn-nav btn-back" id="btnBack" onclick="goBack()">← ย้อนกลับ</button>
        <button class="btn-nav btn-next" id="btnNext" onclick="goNext()" disabled>ถัดไป →</button>
      </div>
    </div>
  </div>

  <!-- RESULTS -->
  <div class="results-section" id="resultsSection"></div>

</div>

<footer class="page-footer">

let TEMPLES = [];

// Load temple data from Supabase
fetchTemples()
  .then(function(rows) {
    TEMPLES = rows.map(toRecommendationFormat);
    console.log('Loaded', TEMPLES.length, 'temples for recommendation');
  })
  .catch(function(err) {
    console.error('Failed to load temple data:', err);
  });

let answers = {};
let currentQ = 0;

function renderQuestion() {
  const q = QUESTIONS[currentQ];
  document.getElementById('questionNum').textContent = `คำถามที่ ${currentQ + 1}`;
  document.getElementById('questionText').textContent = q.text;
  document.getElementById('questionSub').textContent = q.sub;

  const pct = ((currentQ + 1) / QUESTIONS.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `คำถามที่ ${currentQ + 1} จาก ${QUESTIONS.length}`;

  const btnNext = document.getElementById('btnNext');
  const isLast = currentQ === QUESTIONS.length - 1;
  btnNext.textContent = isLast ? 'ดูผลลัพธ์ →' : 'ถัดไป →';
  btnNext.disabled = !answers[q.key];

  document.getElementById('btnBack').style.visibility = currentQ === 0 ? 'hidden' : 'visible';

  const grid = document.getElementById('optionsGrid');
  grid.innerHTML = q.options.map(o => `
    <button class="option-btn ${answers[q.key] === o.value ? 'selected' : ''}"
      onclick="selectOption('${q.key}', '${o.value}', this)">
      <div class="option-icon">${ICONS[o.icon]}</div>
      <div class="option-text">
        <span class="option-label">${o.label}</span>
        <span class="option-sub">${o.sub}</span>
      </div>
      <div class="option-check">
        ${answers[q.key] === o.value ? ICONS.check : ''}
      </div>
    </button>
  `).join('');

  const card = document.getElementById('questionCard');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'slideIn 0.35s ease both';
}

function selectOption(key, value, btn) {
  answers[key] = value;
  document.querySelectorAll('.option-btn').forEach(b => {
    b.classList.remove('selected');
    b.querySelector('.option-check').innerHTML = '';
  });
  btn.classList.add('selected');
  btn.querySelector('.option-check').innerHTML = ICONS.check;
  document.getElementById('btnNext').disabled = false;
}

function goNext() {
  if (currentQ < QUESTIONS.length - 1) {
    currentQ++;
    renderQuestion();
  } else {
    showResults();
  }
}

function goBack() {
  if (currentQ > 0) {
    currentQ--;
    renderQuestion();
  }
}

function scoreTemple(t) {
  let score = 0;
  const loc = answers.location;
  if (loc === 'bkk') score += t.scores['location_bkk'] || 0;
  else if (loc === 'upcountry') score += t.scores['location_upcountry'] || 0;
  else score += t.scores['location_any'] || 1;

  const dur = answers.duration;
  score += t.scores[`duration_${dur}`] || 0;

  const bud = answers.budget;
  if (bud === 'free') score += t.scores['budget_free'] || 0;
  else if (bud === 'budget') score += (t.scores['budget_free'] || 0) + (t.scores['budget_budget'] || 0);
  else if (bud === 'mid') score += (t.scores['budget_mid'] || 0) + (t.scores['budget_budget'] || 0);
  else score += (t.scores['budget_any'] || 1) + (t.scores['budget_mid'] || 0);

  const act = answers.activity;
  score += t.scores[`activity_${act}`] || 0;

  const pro = answers.profile;
  score += t.scores[`profile_${pro}`] || 0;

  return score;
}

function getProfileLabel() {
  const map = {
    beginner: "ผู้เริ่มต้นสนใจธรรมะ",
    intermediate: "ผู้ปฏิบัติมีประสบการณ์",
    women: "ผู้หญิงที่ต้องการสถานที่พิเศษ",
    family: "ครอบครัวที่ต้องการปฏิบัติร่วมกัน"
  };
  return map[answers.profile] || "ผู้ปฏิบัติธรรม";
}

function showResults() {
  document.getElementById('quizSection').style.display = 'none';
  document.getElementById('progressWrap').style.display = 'none';

  const scored = TEMPLES.map(t => ({ ...t, score: scoreTemple(t) }))
    .sort((a, b) => b.score - a.score);

  const maxScore = scored[0].score;

  const profileLabel = getProfileLabel();

  const html = `

      <div class="results-icon">

            </div>

              <div class="match-pct">%</div>
            </div>
          </div>
          <div class="why-list">
            ${t.whys.map(w => `
              <div class="why-item">

        </div>

      <p style="font-size:13px; color:var(--muted); margin-bottom:12px">ต้องการดูสถานที่ทั้งหมดหรือค้นหาเพิ่มเติม?</p>
      <a href="temple-directory.html" style="display:inline-block; margin-right:12px; padding:10px 24px; border-radius:var(--radius-sm); background:var(--primary); color:white; text-decoration:none; font-size:13px; font-weight:600;">ดูทุกสถานที่</a>
      <button class="btn-restart" onclick="restartQuiz()">ทำแบบทดสอบใหม่</button>
    </div>

    <div style="text-align:center; margin-top:24px; padding-top:24px; border-top:1px solid var(--border-light);">
      <button class="btn-save-result" id="btnSaveResult" onclick="handleSaveResult()">
        <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>
        บันทึกผลแนะนำ
      </button>
      <div id="saveStatus" class="save-status"></div>
    </div>
  `;

  // Store for save function
  window._lastResults = top3.map((t, i) => ({
    ...t,
    matchPct: Math.round((t.score / maxScore) * 100)
  }));

  const res = document.getElementById('resultsSection');
  res.style.display = 'block';
  res.innerHTML = html;
  res.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

async function handleSaveResult() {
  const btn = document.getElementById('btnSaveResult');
  const status = document.getElementById('saveStatus');

  // Check if logged in
  const user = await getUser();
  if (!user) {
    openAuthModal('login');
    // After login, auto-save
    const unsub = onAuthChange(async (u) => {
      if (u) {
        await doSave();
      }
    });
    return;
  }
  await doSave();
}

async function doSave() {
  const btn = document.getElementById('btnSaveResult');
  const status = document.getElementById('saveStatus');
  if (!btn || !status) return;

  btn.disabled = true;
  btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg> กำลังบันทึก...';

  try {
    await saveRecommendation(answers, window._lastResults);
    btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg> บันทึกแล้ว';
    btn.style.background = 'var(--primary)';
    status.textContent = 'บันทึกเรียบร้อย! คุณสามารถดูผลย้อนหลังได้เมื่อเข้าสู่ระบบ';
  } catch (err) {
    btn.disabled = false;
    btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg> บันทึกผลแนะนำ';
    status.textContent = 'เกิดข้อผิดพลาด: ' + err.message;
    status.style.color = 'var(--warning)';
  }
}

function restartQuiz() {
  answers = {};
  currentQ = 0;
  document.getElementById('resultsSection').style.display = 'none';
  document.getElementById('resultsSection').innerHTML = '';
  document.getElementById('quizSection').style.display = 'block';
  document.getElementById('progressWrap').style.display = 'block';
  renderQuestion();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Init
renderQuestion();
